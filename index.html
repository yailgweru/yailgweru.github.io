<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; overflow: hidden; background: #0a0a0a; font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; }
  #scene-canvas { position: fixed; inset: 0; display: block; touch-action: none; cursor: grab; }
  #scene-canvas.dragging { cursor: grabbing; }

  .brand {
    position: fixed; top: 16px; left: 16px; z-index: 20;
    display: flex; align-items: center; gap: 10px;
    background: rgba(10,10,10,.55); border: 1px solid rgba(255,255,255,.14);
    border-radius: 14px; padding: 8px 14px 8px 8px; backdrop-filter: blur(8px);
  }
  .brand img { width: 40px; height: 40px; border-radius: 50%; background: #fff; }
  .brand .t1 { font-size: 13px; font-weight: 600; color: #fff; letter-spacing: .3px; }
  .brand .t2 { font-size: 11px; color: #8fe9ff; letter-spacing: 1.5px; text-transform: uppercase; }

  .hint {
    position: fixed; bottom: 18px; left: 50%; transform: translateX(-50%); z-index: 20;
    font-size: 12px; color: rgba(255,255,255,.65); letter-spacing: .5px;
    background: rgba(10,10,10,.5); border: 1px solid rgba(255,255,255,.12);
    padding: 8px 18px; border-radius: 999px; backdrop-filter: blur(6px);
    white-space: nowrap; pointer-events: none; transition: opacity .4s;
  }
  .hint.hidden { opacity: 0; }

  #tooltip {
    position: fixed; z-index: 30; pointer-events: none; opacity: 0;
    transform: translate(-50%, -140%); transition: opacity .15s;
    background: rgba(8, 30, 38, .9); border: 1px solid #6be8ff;
    color: #bff3ff; font-size: 12px; letter-spacing: 1px;
    padding: 7px 14px; border-radius: 4px;
    box-shadow: 0 0 18px rgba(107,232,255,.45), inset 0 0 12px rgba(107,232,255,.12);
    text-transform: uppercase;
  }
  #tooltip.show { opacity: 1; }
  #tooltip::after {
    content: ''; position: absolute; left: 50%; bottom: -5px; transform: translateX(-50%) rotate(45deg);
    width: 8px; height: 8px; background: rgba(8,30,38,.9);
    border-right: 1px solid #6be8ff; border-bottom: 1px solid #6be8ff;
  }

  #holo {
    position: fixed; z-index: 40; width: 300px; max-width: 86vw;
    opacity: 0; pointer-events: none; transform-origin: top left;
    filter: drop-shadow(0 0 22px rgba(107,232,255,.35));
  }
  #holo.open { opacity: 1; pointer-events: auto; animation: holoIn .45s cubic-bezier(.2,.9,.3,1.2); }
  @keyframes holoIn {
    0% { opacity: 0; transform: scale(.6) translateY(14px); filter: drop-shadow(0 0 0 rgba(107,232,255,0)); }
    55% { opacity: .7; }
    62% { opacity: .3; }
    70% { opacity: 1; }
    100% { opacity: 1; transform: scale(1) translateY(0); }
  }
  .holo-panel {
    position: relative; background: rgba(6, 24, 32, .82);
    border: 1px solid rgba(107,232,255,.75); border-radius: 6px;
    backdrop-filter: blur(10px); overflow: hidden;
    clip-path: polygon(0 12px, 12px 0, 100% 0, 100% calc(100% - 12px), calc(100% - 12px) 100%, 0 100%);
  }
  .holo-panel::before {
    content: ''; position: absolute; inset: 0; pointer-events: none;
    background: repeating-linear-gradient(0deg, rgba(107,232,255,.06) 0 1px, transparent 1px 4px);
    animation: scan 6s linear infinite;
  }
  @keyframes scan { to { background-position: 0 40px; } }
  .holo-head {
    display: flex; align-items: center; justify-content: space-between;
    padding: 12px 14px; border-bottom: 1px solid rgba(107,232,255,.35);
  }
  .holo-head .ht { font-size: 13px; font-weight: 700; color: #d8f8ff; letter-spacing: 3px; text-transform: uppercase; }
  .holo-head .hsub { font-size: 10px; color: #6be8ff; letter-spacing: 1px; margin-top: 2px; }
  .holo-close {
    background: none; border: 1px solid rgba(107,232,255,.5); color: #6be8ff;
    width: 26px; height: 26px; border-radius: 4px; font-size: 14px; line-height: 1;
    cursor: pointer; flex-shrink: 0;
  }
  .holo-close:hover { background: rgba(107,232,255,.15); }
  .holo-items { padding: 6px 0 10px; }
  .holo-item { border-bottom: 1px dashed rgba(107,232,255,.18); }
  .holo-item:last-child { border-bottom: none; }
  .holo-item-btn {
    width: 100%; text-align: left; background: none; border: none; cursor: pointer;
    padding: 11px 14px; display: flex; align-items: center; gap: 10px;
    color: #bff3ff; font-size: 13px; letter-spacing: .5px; font-family: inherit;
  }
  .holo-item-btn .dot { width: 6px; height: 6px; background: #6be8ff; transform: rotate(45deg); flex-shrink: 0; box-shadow: 0 0 8px #6be8ff; }
  .holo-item-btn .chev { margin-left: auto; color: rgba(107,232,255,.7); font-size: 11px; transition: transform .3s; }
  .holo-item.expanded .holo-item-btn .chev { transform: rotate(90deg); }
  .holo-item-btn:hover { background: rgba(107,232,255,.08); }
  .holo-detail {
    max-height: 0; overflow: hidden; transition: max-height .35s ease;
    font-size: 12px; line-height: 1.65; color: rgba(216,248,255,.82);
  }
  .holo-item.expanded .holo-detail { max-height: 220px; }
  .holo-detail-inner { padding: 2px 14px 12px 30px; }
  .holo-detail-inner a { color: #6be8ff; }
  .holo-back {
    display: block; width: calc(100% - 28px); margin: 0 14px 12px;
    background: rgba(107,232,255,.1); border: 1px solid rgba(107,232,255,.5);
    color: #d8f8ff; font-size: 11px; letter-spacing: 2px; text-transform: uppercase;
    padding: 9px; border-radius: 4px; cursor: pointer; font-family: inherit;
  }
  .holo-back:hover { background: rgba(107,232,255,.2); }
  .holo-beam {
    position: absolute; left: 24px; top: 100%; width: 2px; height: 60px;
    background: linear-gradient(to bottom, rgba(107,232,255,.8), transparent);
    pointer-events: none;
  }

  #story {
    position: fixed; top: 0; right: 0; height: 100%;
    width: min(430px, 94vw); z-index: 60;
    transform: translateX(105%); transition: transform .45s cubic-bezier(.2,.8,.25,1);
    pointer-events: none;
  }
  #story.open { transform: translateX(0); pointer-events: auto; }
  .story-panel {
    height: 100%; display: flex; flex-direction: column; position: relative; overflow: hidden;
    background: rgba(5, 15, 23, .97); border-left: 1px solid rgba(107,232,255,.55);
    box-shadow: -24px 0 70px rgba(0,0,0,.65); backdrop-filter: blur(12px);
  }
  .story-panel::before {
    content: ''; position: absolute; inset: 0; pointer-events: none;
    background: repeating-linear-gradient(0deg, rgba(107,232,255,.045) 0 1px, transparent 1px 4px);
  }
  .story-head { padding: 22px 54px 16px 22px; border-bottom: 1px solid rgba(107,232,255,.3); flex-shrink: 0; }
  .story-kicker { font-size: 10px; letter-spacing: 3px; color: #6be8ff; text-transform: uppercase; margin-bottom: 8px; }
  .story-title { font-size: 20px; font-weight: 700; color: #eaf9ff; line-height: 1.3; }
  .story-meta { font-size: 11px; color: rgba(191,243,255,.6); margin-top: 8px; letter-spacing: .5px; }
  .story-close { position: absolute; top: 18px; right: 16px; z-index: 2; }
  .story-body { overflow-y: auto; padding: 18px 22px 34px; font-size: 14px; line-height: 1.78; color: rgba(222,242,250,.88); }
  .story-body p { margin: 0 0 15px; }
  @media (prefers-reduced-motion: reduce) { #story { transition: none; } }

  #loader {
    position: fixed; inset: 0; z-index: 100; background: #0a0a0a;
    display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 18px;
    transition: opacity .6s; color: #6be8ff;
  }
  #loader.done { opacity: 0; pointer-events: none; }
  #loader .ring {
    width: 54px; height: 54px; border-radius: 50%;
    border: 2px solid rgba(107,232,255,.15); border-top-color: #6be8ff;
    animation: spin 1s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  #loader p { font-size: 11px; letter-spacing: 4px; text-transform: uppercase; }

  @media (max-width: 640px) {
    #holo { position: fixed !important; left: 50% !important; top: auto !important; bottom: calc(14px + env(safe-area-inset-bottom)); transform: translateX(-50%); width: 92vw; max-width: 380px; }
    #holo.open { animation: holoInMobile .4s ease; }
    @keyframes holoInMobile { from { opacity: 0; transform: translateX(-50%) translateY(30px); } to { opacity: 1; transform: translateX(-50%) translateY(0); } }
    .holo-beam { display: none; }
    .brand { top: calc(16px + env(safe-area-inset-top)); }
    .brand .t1 { font-size: 12px; }
    .hint { font-size: 11px; padding: 7px 14px; bottom: auto; top: calc(78px + env(safe-area-inset-top)); }
    /* keep interactive controls at a comfortably tappable size on touch screens */
    .holo-close, .story-close { width: 40px; height: 40px; font-size: 16px; }
    .holo-item-btn { padding: 13px 14px; min-height: 44px; }
    #story { width: min(430px, 100vw); }
    .story-head { padding: calc(22px + env(safe-area-inset-top)) 54px 16px 22px; }
    .story-body { padding-bottom: calc(34px + env(safe-area-inset-bottom)); }
  }
  @media (prefers-reduced-motion: reduce) {
    #holo.open, .holo-panel::before { animation: none !important; }
  }

  .sr-only {
    position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px;
    overflow: hidden; clip: rect(0, 0, 0, 0); white-space: nowrap; border: 0;
  }
</style>

<main id="seo-content" class="sr-only" aria-label="Young AI Leaders Gweru Hub">
  <h1>Young AI Leaders Gweru Hub — Youth AI, Tech &amp; Social Innovation in Zimbabwe</h1>
  <p>Gweru Hub empowers Zimbabwean youth through ethical AI, social innovation and community tech. Join young AI leaders building real impact across the Midlands Province.</p>
</main>

<canvas id="scene-canvas"></canvas>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
function resolveLogo(logo) {
  if (logo.startsWith('data:') || /^https?:\/\//.test(logo) || logo.startsWith('assets/') || logo.startsWith('/')) return logo;
  return 'data:image/png;base64,' + logo;
}

function absoluteUrl(path) {
  if (/^https?:\/\//.test(path)) return path;
  return location.origin + '/' + path.replace(/^\//, '');
}

function setMeta(name, content, useProperty) {
  if (!content) return;
  var attr = useProperty ? 'property' : 'name';
  var el = document.querySelector('meta[' + attr + '="' + name + '"]');
  if (!el) {
    el = document.createElement('meta');
    el.setAttribute(attr, name);
    document.head.appendChild(el);
  }
  el.setAttribute('content', content);
}

function applySeo(site, sections, logoPath) {
  var seo = site.seo || {};
  var canonical = seo.canonicalUrl || (location.origin + '/');
  var image = absoluteUrl(seo.ogImage || logoPath);
  var title = seo.title || site.title;
  var description = seo.description || '';
  var keywords = Array.isArray(seo.keywords) ? seo.keywords.join(', ') : seo.keywords;

  document.title = title;
  setMeta('description', description);
  setMeta('keywords', keywords);
  setMeta('og:title', title, true);
  setMeta('og:description', description, true);
  setMeta('og:url', canonical, true);
  setMeta('og:image', image, true);
  setMeta('og:locale', seo.locale || 'en_ZW', true);
  setMeta('twitter:title', title);
  setMeta('twitter:description', description);
  setMeta('twitter:image', image);
  if (seo.twitterHandle) setMeta('twitter:site', seo.twitterHandle);

  var linkCanon = document.querySelector('link[rel="canonical"]');
  if (linkCanon) linkCanon.href = canonical;

  var graph = [
    {
      '@type': 'Organization',
      '@id': canonical + '#organization',
      name: site.brand.name + ' — Gweru Hub',
      alternateName: ['Young AI Leaders Gweru', 'YAL Gweru Hub'],
      url: canonical,
      logo: { '@type': 'ImageObject', url: image },
      description: description,
      areaServed: { '@type': 'Country', name: 'Zimbabwe' },
      location: {
        '@type': 'Place',
        name: 'Gweru',
        address: {
          '@type': 'PostalAddress',
          addressLocality: 'Gweru',
          addressRegion: 'Midlands Province',
          addressCountry: 'ZW'
        }
      },
      knowsAbout: [
        'Artificial Intelligence', 'Social Innovation', 'Youth Empowerment',
        'Technology in Zimbabwe', 'AI for Good', 'Community Impact', 'Ethical AI'
      ],
      memberOf: { '@type': 'Organization', name: 'AI for Good (ITU)' }
    },
    {
      '@type': 'WebSite',
      '@id': canonical + '#website',
      url: canonical,
      name: title,
      description: description,
      publisher: { '@id': canonical + '#organization' },
      inLanguage: 'en-ZW'
    }
  ];

  sections.forEach(function (s) {
    (s.items || []).forEach(function (item) {
      if (!item.story) return;
      graph.push({
        '@type': 'BlogPosting',
        headline: item.label,
        description: item.detail,
        author: { '@type': 'Organization', name: item.story.author },
        datePublished: item.story.date,
        articleBody: item.story.body.join('\n\n'),
        publisher: { '@id': canonical + '#organization' },
        mainEntityOfPage: canonical + '#blogs'
      });
    });
  });

  var ldScript = document.getElementById('ld-json');
  if (!ldScript) {
    ldScript = document.createElement('script');
    ldScript.id = 'ld-json';
    ldScript.type = 'application/ld+json';
    document.head.appendChild(ldScript);
  }
  ldScript.textContent = JSON.stringify({ '@context': 'https://schema.org', '@graph': graph });

  var main = document.getElementById('seo-content');
  if (!main) return;
  var html = '<h1>' + (seo.h1 || title) + '</h1><p>' + description + '</p>';
  sections.forEach(function (s) {
    html += '<section id="' + s.id + '"><h2>' + s.title + ' — ' + s.sub + '</h2><ul>';
    (s.items || []).forEach(function (item) {
      html += '<li><h3>' + item.label + '</h3><p>' + item.detail + '</p>';
      if (item.story) {
        html += '<article><p>' + item.story.body.join('</p><p>') + '</p></article>';
      }
      html += '</li>';
    });
    html += '</ul></section>';
  });
  main.innerHTML = html;
}

(async function init() {
  let data;
  try {
    const res = await fetch('data.json');
    if (!res.ok) throw new Error('HTTP ' + res.status);
    data = await res.json();
  } catch (err) {
    console.error('Failed to load data.json', err);
    document.getElementById('loader').querySelector('p').textContent = 'Failed to load hub data';
    return;
  }

  const site = data.site;
  const SECTIONS_RAW = data.sections;
  applySeo(site, SECTIONS_RAW, data.logo);
  document.querySelector('.brand .t1').textContent = site.brand.name;
  document.querySelector('.brand .t2').textContent = site.brand.tagline;
  document.getElementById('hint').textContent = site.hint;
  document.querySelector('.story-kicker').textContent = site.storyKicker;
  document.getElementById('brand-logo').alt = site.brand.name + ' logo';

  const LOGO_URL = resolveLogo(data.logo);
  document.getElementById('brand-logo').src = LOGO_URL;

  const SECTIONS = data.sections.map(function (s) {
    return Object.assign({}, s, {
      color: typeof s.color === 'string' ? parseInt(s.color.replace(/^0x/i, ''), 16) : s.color
    });
  });

  const isMobile = matchMedia('(pointer: coarse)').matches || innerWidth < 640;
  const reducedMotion = matchMedia('(prefers-reduced-motion: reduce)').matches;

const canvas = document.getElementById('scene-canvas');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: !isMobile, alpha: false });
renderer.setPixelRatio(Math.min(devicePixelRatio, isMobile ? 1.75 : 2));
renderer.setSize(innerWidth, innerHeight);
renderer.outputEncoding = THREE.sRGBEncoding;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 0.95;

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x03040a);
scene.fog = new THREE.Fog(0x070a12, 22, 52);

const camera = new THREE.PerspectiveCamera(innerWidth / innerHeight < 0.8 ? 64 : 50, innerWidth / innerHeight, 0.1, 100);

const orbit = {
  theta: 0.4, phi: 1.42, radius: isMobile ? 16.5 : 13.25,
  target: new THREE.Vector3(0, 1.8, 0),
  minPhi: 0.45, maxPhi: 1.45, minR: 7, maxR: 24
};
function applyOrbit() {
  camera.position.set(
    orbit.target.x + orbit.radius * Math.sin(orbit.phi) * Math.sin(orbit.theta),
    orbit.target.y + orbit.radius * Math.cos(orbit.phi),
    orbit.target.z + orbit.radius * Math.sin(orbit.phi) * Math.cos(orbit.theta)
  );
  camera.lookAt(orbit.target);
}
applyOrbit();

scene.add(new THREE.AmbientLight(0x30405c, 0.5));
const key = new THREE.DirectionalLight(0xbfd4ff, 0.32); key.position.set(-8, 9, -9); scene.add(key);
const rim = new THREE.DirectionalLight(0x6be8ff, 0.3); rim.position.set(8, 5, 7); scene.add(rim);
const centerGlow = new THREE.PointLight(0x6be8ff, 0.8, 20); centerGlow.position.set(0, 3.5, 0); scene.add(centerGlow);

// ---------- near-realistic night-city world ----------
const world = new THREE.Group();
scene.add(world);

function makeSkyTexture() {
  const c = document.createElement('canvas'); c.width = 1024; c.height = 512;
  const g = c.getContext('2d');
  const grad = g.createLinearGradient(0, 0, 0, 512);
  grad.addColorStop(0, '#04050c');
  grad.addColorStop(0.55, '#090e19');
  grad.addColorStop(0.82, '#0e1420');
  grad.addColorStop(1, '#161d2c');
  g.fillStyle = grad; g.fillRect(0, 0, 1024, 512);
  for (let i = 0; i < 460; i++) {
    const x = Math.random() * 1024, y = Math.pow(Math.random(), 1.4) * 340;
    g.globalAlpha = Math.random() * 0.75 + 0.15;
    g.fillStyle = '#ffffff';
    g.beginPath(); g.arc(x, y, Math.random() * 0.9 + 0.2, 0, Math.PI * 2); g.fill();
  }
  g.globalAlpha = 1;
  return new THREE.CanvasTexture(c);
}
const sky = new THREE.Mesh(
  new THREE.SphereGeometry(62, 32, 16),
  new THREE.MeshBasicMaterial({ map: makeSkyTexture(), side: THREE.BackSide, fog: false })
);
sky.position.y = 4;
world.add(sky);

function makeGlowTexture() {
  const c = document.createElement('canvas'); c.width = 128; c.height = 128;
  const g = c.getContext('2d');
  const grad = g.createRadialGradient(64, 64, 2, 64, 64, 64);
  grad.addColorStop(0, 'rgba(255,255,255,1)');
  grad.addColorStop(0.25, 'rgba(255,255,255,0.55)');
  grad.addColorStop(0.6, 'rgba(255,255,255,0.14)');
  grad.addColorStop(1, 'rgba(255,255,255,0)');
  g.fillStyle = grad; g.fillRect(0, 0, 128, 128);
  return new THREE.CanvasTexture(c);
}
const glowTex = makeGlowTexture();

const moonGlow = new THREE.Sprite(new THREE.SpriteMaterial({ map: glowTex, color: 0xcfdcff, transparent: true, opacity: 0.55, fog: false, depthWrite: false }));
moonGlow.scale.set(16, 16, 1); moonGlow.position.set(-30, 24, -36); world.add(moonGlow);
const moonCore = new THREE.Sprite(new THREE.SpriteMaterial({ map: glowTex, color: 0xf2f6ff, transparent: true, opacity: 1, fog: false, depthWrite: false }));
moonCore.scale.set(5.5, 5.5, 1); moonCore.position.copy(moonGlow.position); world.add(moonCore);

const ground = new THREE.Mesh(
  new THREE.CircleGeometry(70, 48),
  new THREE.MeshStandardMaterial({ color: 0x06080d, roughness: 0.55, metalness: 0.35, transparent: true, opacity: 0.78 })
);
ground.rotation.x = -Math.PI / 2;
ground.position.y = -2.23;
ground.renderOrder = -1;
world.add(ground);

const lightPool = new THREE.Mesh(
  new THREE.CircleGeometry(6.5, 48),

);
lightPool.rotation.x = -Math.PI / 2;
lightPool.position.y = -2.2;
world.add(lightPool);

function makeFacadeTexture(litChance) {
  const c = document.createElement('canvas'); c.width = 256; c.height = 512;
  const g = c.getContext('2d');
  g.fillStyle = '#10131a'; g.fillRect(0, 0, 256, 512);
  g.fillStyle = 'rgba(255,255,255,0.025)';
  for (let x = 0; x < 256; x += 32) g.fillRect(x, 0, 1, 512);
  const cols = 8, rows = 19, cw = 256 / cols, rh = (512 - 22) / rows;
  for (let r = 0; r < rows; r++) {
    for (let col = 0; col < cols; col++) {
      const y = 22 + r * rh;
      if (Math.random() < litChance) {
        const warm = Math.random() < 0.55;
        g.globalAlpha = 0.3 + Math.random() * 0.65;
        g.fillStyle = warm ? '#ffd68a' : '#a8ccff';
        g.fillRect(col * cw + 3, y + 3, cw - 6, rh - 8);
        g.globalAlpha = 1;
      } else {
        g.fillStyle = 'rgba(0,0,0,0.45)';
        g.fillRect(col * cw + 3, y + 3, cw - 6, rh - 8);
      }
    }
  }
  g.fillStyle = '#0b0d12';
  g.fillRect(0, 0, 16, 16);
  return new THREE.CanvasTexture(c);
}

const beaconSpots = [];
function buildingBatch(count, litChance, rMin, rMax) {
  const tex = makeFacadeTexture(litChance);
  const mat = new THREE.MeshStandardMaterial({
    color: 0x141821, map: tex,
    emissive: 0xffffff, emissiveMap: tex, emissiveIntensity: 0.55,
    roughness: 0.9, metalness: 0.08
  });
  const geo = new THREE.BoxGeometry(1, 1, 1);
  const uv = geo.attributes.uv;
  for (let i = 8; i < 16; i++) uv.setXY(i, 0.02, 0.985);
  uv.needsUpdate = true;
  const reflMat = new THREE.MeshStandardMaterial({
    color: 0x0a0d14, map: tex,
    emissive: 0xffffff, emissiveMap: tex, emissiveIntensity: 0.16,
    roughness: 1, metalness: 0, transparent: true, opacity: 0.4, side: THREE.DoubleSide
  });
  const mesh = new THREE.InstancedMesh(geo, mat, count);
  const refl = new THREE.InstancedMesh(geo, reflMat, count);
  refl.renderOrder = -2;
  const m = new THREE.Matrix4(), q = new THREE.Quaternion(), s = new THREE.Vector3(), pos = new THREE.Vector3();
  const eul = new THREE.Euler();
  const shade = new THREE.Color();
  for (let i = 0; i < count; i++) {
    const ang = Math.random() * Math.PI * 2;
    const rad = rMin + Math.random() * (rMax - rMin);
    const w = 1.4 + Math.random() * 2.4;
    const d = 1.4 + Math.random() * 2.4;
    const h = 2.5 + Math.pow(Math.random(), 1.7) * 12;
    pos.set(Math.sin(ang) * rad, -2.23 + h / 2, Math.cos(ang) * rad);
    q.setFromEuler(eul.set(0, (Math.random() - 0.5) * 0.3, 0));
    s.set(w, h, d);
    m.compose(pos, q, s);
    mesh.setMatrixAt(i, m);
    if (h > 11 && beaconSpots.length < 12) beaconSpots.push(new THREE.Vector3(pos.x, -2.23 + h + 0.35, pos.z));
    pos.y = -2.23 - h / 2 - 0.02;
    s.set(w, -h, d);
    m.compose(pos, q, s);
    refl.setMatrixAt(i, m);
    if (mesh.setColorAt) mesh.setColorAt(i, shade.setScalar(0.45 + Math.random() * 0.4));
  }
  mesh.instanceMatrix.needsUpdate = true;
  refl.instanceMatrix.needsUpdate = true;
  if (mesh.instanceColor) mesh.instanceColor.needsUpdate = true;
  world.add(mesh);
  world.add(refl);
}
const bCount = isMobile ? 26 : 46;
buildingBatch(bCount, 0.14, 19, 28);
buildingBatch(bCount, 0.24, 25, 36);
buildingBatch(bCount, 0.34, 31, 44);

const beacons = beaconSpots.map(function (p, i) {
  const b = new THREE.Sprite(new THREE.SpriteMaterial({ map: glowTex, color: 0xff4d4d, transparent: true, opacity: 0.8, depthWrite: false }));
  b.scale.set(0.9, 0.9, 1);
  b.position.copy(p);
  world.add(b);
  return b;
});

const dustGeo = new THREE.BufferGeometry();
const dustN = isMobile ? 90 : 180;
const dustPos = new Float32Array(dustN * 3);
for (let i = 0; i < dustN; i++) {
  const a = Math.random() * Math.PI * 2, r = 3 + Math.random() * 19;
  dustPos[i * 3] = Math.sin(a) * r;
  dustPos[i * 3 + 1] = -2 + Math.random() * 12;
  dustPos[i * 3 + 2] = Math.cos(a) * r;
}
dustGeo.setAttribute('position', new THREE.BufferAttribute(dustPos, 3));
const dust = new THREE.Points(dustGeo, new THREE.PointsMaterial({
  size: 0.07, color: 0x9fc8ff, transparent: true, opacity: 0.4,
  blending: THREE.AdditiveBlending, depthWrite: false
}));
scene.add(dust);

const cars = [];
const carGroup = new THREE.Group();
world.add(carGroup);
const carN = isMobile ? 14 : 26;
const lanes = [14.6, 15.9, 17.2];
for (let i = 0; i < carN; i++) {
  const tail = Math.random() < 0.5;
  const spr = new THREE.Sprite(new THREE.SpriteMaterial({
    map: glowTex, color: tail ? 0xff3b30 : 0xfff2cc,

  }));
  spr.scale.set(0.55, 0.16, 1);
  const lane = lanes[i % lanes.length] + (Math.random() - 0.5) * 0.4;
  const car = { spr: spr, r: lane, a: Math.random() * Math.PI * 2, speed: (0.06 + Math.random() * 0.1) * (tail ? -1 : 1) };
  spr.position.set(Math.sin(car.a) * car.r, -2.1, Math.cos(car.a) * car.r);
  cars.push(car);
  carGroup.add(spr);
}

const pinGroup = new THREE.Group();
scene.add(pinGroup);
const pinMat = new THREE.MeshStandardMaterial({ color: 0x0c0c0c, metalness: 0.6, roughness: 0.32, emissive: 0x04141c, emissiveIntensity: 0.45 });
const logoHolder = new THREE.Group();
pinGroup.add(logoHolder);
const headRim = new THREE.Mesh(new THREE.TorusGeometry(1.5, 0.17, 16, isMobile ? 48 : 72), pinMat);
logoHolder.add(headRim);
const pinRing = new THREE.Mesh(
  new THREE.TorusGeometry(1.76, 0.045, 8, isMobile ? 48 : 72),
  new THREE.MeshStandardMaterial({ color: 0x6be8ff, emissive: 0x6be8ff, emissiveIntensity: 0.9, metalness: 0.2, roughness: 0.3 })
);
logoHolder.add(pinRing);
const pinTail = new THREE.Mesh(new THREE.ConeGeometry(0.72, 2.1, isMobile ? 24 : 40), pinMat);
pinTail.rotation.x = Math.PI;
pinTail.position.y = -2.75;
pinGroup.add(pinTail);
const neck = new THREE.Mesh(new THREE.SphereGeometry(0.3, 16, 12), pinMat);
neck.position.y = -1.66;
pinGroup.add(neck);
const haloRing = new THREE.Mesh(
  new THREE.TorusGeometry(2.5, 0.025, 8, 80),
  new THREE.MeshBasicMaterial({ color: 0x6be8ff, transparent: true, opacity: 0.5 })
);
haloRing.rotation.x = Math.PI / 2;
pinGroup.add(haloRing);
const pinGlow = new THREE.Sprite(new THREE.SpriteMaterial({ map: glowTex, color: 0x6be8ff, transparent: true, opacity: 0.4, blending: THREE.AdditiveBlending, depthWrite: false }));
pinGlow.scale.set(7, 7, 1);
pinGroup.add(pinGlow);
pinGroup.position.y = 2.6;

const texLoader = new THREE.TextureLoader();
texLoader.load(LOGO_URL, function (logoTex) {
  logoTex.encoding = THREE.sRGBEncoding;
  const discGeo = new THREE.CircleGeometry(1.52, 64);
  const whiteMat = new THREE.MeshBasicMaterial({ color: 0xffffff });
  const logoGeo = new THREE.CircleGeometry(1.42, 64);
  const logoMat = new THREE.MeshBasicMaterial({ map: logoTex, transparent: true });
  [1, -1].forEach(function (side) {
    const back = new THREE.Mesh(discGeo, whiteMat);

  document.getElementById('loader').classList.add('done');

});

function makeLabelSprite(text) {
  const c = document.createElement('canvas'); c.width = 512; c.height = 128;
  const g = c.getContext('2d');
  g.font = '600 58px Segoe UI, system-ui, sans-serif';
  g.textAlign = 'center'; g.textBaseline = 'middle';
  g.shadowColor = 'rgba(0,0,0,0.9)'; g.shadowBlur = 14;
  g.fillStyle = '#ffffff';
  g.fillText(text, 256, 64);
  const tex = new THREE.CanvasTexture(c);
  const sp = new THREE.Sprite(new THREE.SpriteMaterial({ map: tex, transparent: true, depthWrite: false }));
  sp.scale.set(3.4, 0.85, 1);
  return sp;
}

const anchorMeshes = [];
const anchorGroups = [];
SECTIONS.forEach(function (s, i) {
  const g = new THREE.Group();
  g.position.set(s.pos[0], s.pos[1], s.pos[2]);

  const core = new THREE.Mesh(
    new THREE.IcosahedronGeometry(0.62, 0),
    new THREE.MeshStandardMaterial({ color: s.color, flatShading: true, metalness: 0.0, roughness: 0.45, emissive: s.color, emissiveIntensity: 0.75 })
  );
  core.userData.section = s;
  g.add(core);

  const glow = new THREE.Sprite(new THREE.SpriteMaterial({ map: glowTex, color: s.color, transparent: true, opacity: 0.75, blending: THREE.AdditiveBlending, depthWrite: false }));
  glow.scale.set(3.6, 3.6, 1);
  g.add(glow);

  if (!isMobile) {
    const orbLight = new THREE.PointLight(s.color, 0.55, 7);
    g.add(orbLight);
  }

  const ring = new THREE.Mesh(
    new THREE.TorusGeometry(1.0, 0.022, 8, 48),
    new THREE.MeshBasicMaterial({ color: s.color, transparent: true, opacity: 0.7 })
  );
  ring.rotation.x = Math.PI / 2 + 0.4 * (i % 2 ? 1 : -1);
  g.add(ring);

  const label = makeLabelSprite(s.title);
  label.position.y = 1.35;
  g.add(label);

  g.userData = { section: s, core, ring, glow, baseY: s.pos[1], phase: i * 1.3 };
  scene.add(g);
  anchorMeshes.push(core);
  anchorGroups.push(g);
});

const raycaster = new THREE.Raycaster();
const pointer = new THREE.Vector2();
const tooltip = document.getElementById('tooltip');
const holo = document.getElementById('holo');
const holoTitle = document.getElementById('holo-title');
const holoSub = document.getElementById('holo-sub');
const holoItems = document.getElementById('holo-items');
const hint = document.getElementById('hint');

let hovered = null;
let focused = null;
let camTween = null;

function tweenCamera(toTheta, toPhi, toR, toTarget, dur, onDone) {
  camTween = {
    start: performance.now(), dur: reducedMotion ? 1 : dur,
    fromTheta: orbit.theta, toTheta,
    fromPhi: orbit.phi, toPhi,
    fromR: orbit.radius, toR,
    fromTarget: orbit.target.clone(), toTarget: toTarget.clone(),
    onDone
  };
}
function easeInOut(t) { return t < 0.5 ? 2 * t * t : 1 - Math.pow(-2 * t + 2, 2) / 2; }

function focusSection(group) {
  focused = group;
  hint.classList.add('hidden');
  const p = group.position;
  const toTheta = Math.atan2(p.x, p.z);
  const toPhi = Math.max(orbit.minPhi, Math.min(orbit.maxPhi, Math.acos(Math.max(-1, Math.min(1, (p.y - p.y * 0.4) / 6))) ));
  const toTarget = p.clone();
  tweenCamera(toTheta, 1.15, isMobile ? 7.5 : 6, toTarget, 900, function () {
    openHolo(group.userData.section);
  });
}

function unfocus() {
  closeHolo();
  closeStory();
  focused = null;
  hint.classList.remove('hidden');
  tweenCamera(orbit.theta, 1.42, isMobile ? 16.5 : 13.25, new THREE.Vector3(0, 1.8, 0), 900);
}

function openHolo(section) {
  holoTitle.textContent = section.title;
  holoSub.textContent = section.sub;
  holoItems.innerHTML = '';
  section.items.forEach(function (item) {
    const wrap = document.createElement('div');
    wrap.className = 'holo-item';
    const btn = document.createElement('button');
    btn.className = 'holo-item-btn';
    btn.innerHTML = '<span class="dot"></span><span>' + item.label + '</span><span class="chev">' + (item.story ? '\u2192' : '\u25b6') + '</span>';
    btn.addEventListener('click', function (e) {
      e.stopPropagation();
      if (item.story) { openStory(item); return; }
      const wasOpen = wrap.classList.contains('expanded');
      holoItems.querySelectorAll('.holo-item').forEach(function (el) { el.classList.remove('expanded'); });
      if (!wasOpen) wrap.classList.add('expanded');
    });
    const det = document.createElement('div');
    det.className = 'holo-detail';
    det.innerHTML = '<div class="holo-detail-inner">' + item.detail + '</div>';
    wrap.appendChild(btn);
    wrap.appendChild(det);
    holoItems.appendChild(wrap);
  });
  holo.classList.remove('open');
  void holo.offsetWidth;
  holo.classList.add('open');
}
function closeHolo() { holo.classList.remove('open'); }

const story = document.getElementById('story');
function openStory(item) {
  document.getElementById('story-title').textContent = item.label;
  document.getElementById('story-meta').textContent = item.story.date + ' \u00b7 ' + item.story.author;
  const body = document.getElementById('story-body');
  body.innerHTML = '';
  item.story.body.forEach(function (p) {
    const el = document.createElement('p');
    el.textContent = p;
    body.appendChild(el);
  });
  body.scrollTop = 0;
  story.classList.add('open');
  story.setAttribute('aria-hidden', 'false');
}
function closeStory() {
  story.classList.remove('open');
  story.setAttribute('aria-hidden', 'true');
}
document.getElementById('story-close').addEventListener('click', closeStory);
addEventListener('keydown', function (e) { if (e.key === 'Escape') closeStory(); });

document.getElementById('holo-close').addEventListener('click', unfocus);
document.getElementById('holo-back').addEventListener('click', unfocus);

let dragging = false, moved = 0, lastX = 0, lastY = 0;
let pinchDist = 0;

canvas.addEventListener('pointerdown', function (e) {
  if (e.isPrimary === false) return;
  dragging = true; moved = 0; lastX = e.clientX; lastY = e.clientY;
  canvas.classList.add('dragging');
  canvas.setPointerCapture(e.pointerId);
});
canvas.addEventListener('pointermove', function (e) {
  pointer.x = (e.clientX / innerWidth) * 2 - 1;
  pointer.y = -(e.clientY / innerHeight) * 2 + 1;
  if (dragging) {
    const dx = e.clientX - lastX, dy = e.clientY - lastY;
    moved += Math.abs(dx) + Math.abs(dy);
    orbit.theta -= dx * 0.0055;
    orbit.phi = Math.max(orbit.minPhi, Math.min(orbit.maxPhi, orbit.phi - dy * 0.004));
    lastX = e.clientX; lastY = e.clientY;
    if (moved > 8) { camTween = null; }
  }
});
canvas.addEventListener('pointerup', function (e) {
  dragging = false;
  canvas.classList.remove('dragging');
  if (moved < 8) {
    pointer.x = (e.clientX / innerWidth) * 2 - 1;
    pointer.y = -(e.clientY / innerHeight) * 2 + 1;
    raycaster.setFromCamera(pointer, camera);
    const hits = raycaster.intersectObjects(anchorMeshes);
    if (hits.length) {
      const grp = hits[0].object.parent;
      if (focused === grp) { unfocus(); }
      else { closeHolo(); focusSection(grp); }
    } else if (focused) {
      unfocus();
    }
  }
});
canvas.addEventListener('wheel', function (e) {
  e.preventDefault();
  orbit.radius = Math.max(orbit.minR, Math.min(orbit.maxR, orbit.radius + e.deltaY * 0.012));
}, { passive: false });

canvas.addEventListener('touchstart', function (e) {
  if (e.touches.length === 2) {
    pinchDist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
  }
}, { passive: true });
canvas.addEventListener('touchmove', function (e) {
  if (e.touches.length === 2) {
    const d = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
    orbit.radius = Math.max(orbit.minR, Math.min(orbit.maxR, orbit.radius - (d - pinchDist) * 0.03));
    pinchDist = d;
  }
}, { passive: true });

const clock = new THREE.Clock();
const worldPos = new THREE.Vector3();

function animate() {
  requestAnimationFrame(animate);
  const t = clock.getElapsedTime();

  if (!reducedMotion) {
    pinGroup.rotation.y = t * 0.25;
    pinGroup.position.y = 2.6 + Math.sin(t * 0.9) * 0.14;
    haloRing.rotation.z = t * 0.4;
    pinRing.rotation.z = t * 0.6;
    world.rotation.y = t * 0.006;
    dust.rotation.y = -t * 0.012;
    pinGlow.material.opacity = 0.2 + Math.sin(t * 1.4) * 0.06;
    beacons.forEach(function (b, i) {
      b.material.opacity = 0.35 + Math.abs(Math.sin(t * 1.6 + i * 1.1)) * 0.55;
    });
    cars.forEach(function (c) {
      const a = c.a + t * c.speed;
      c.spr.position.set(Math.sin(a) * c.r, -2.1, Math.cos(a) * c.r);
    });
  }
  logoHolder.rotation.y = orbit.theta - pinGroup.rotation.y;

  if (!reducedMotion) {
    anchorGroups.forEach(function (g) {
      if (focused === g) {
        g.position.y += (g.userData.baseY - g.position.y) * 0.1;
      } else {
        g.position.y = g.userData.baseY + Math.sin(t * 1.1 + g.userData.phase) * 0.22;
      }
      g.userData.core.rotation.y = t * 0.7 + g.userData.phase;
      g.userData.ring.rotation.z = t * 0.9;
      const targetScale = (hovered === g.userData.core || focused === g) ? 1.35 : 1;
      g.userData.core.scale.lerp(new THREE.Vector3(targetScale, targetScale, targetScale), 0.12);
      const active = (hovered === g.userData.core || focused === g);
      g.userData.glow.material.opacity = (active ? 0.95 : 0.65) + Math.sin(t * 2 + g.userData.phase) * 0.15;
      const gs = (active ? 4.4 : 3.6) + Math.sin(t * 2 + g.userData.phase) * 0.25;
      g.userData.glow.scale.set(gs, gs, 1);
    });
  }

  if (!dragging && !isMobile) {
    raycaster.setFromCamera(pointer, camera);
    const hits = raycaster.intersectObjects(anchorMeshes);
    if (hits.length) {
      hovered = hits[0].object;
      canvas.style.cursor = 'pointer';
      hovered.parent.getWorldPosition(worldPos);
      const sp = worldPos.clone().project(camera);
      tooltip.style.left = ((sp.x * 0.5 + 0.5) * innerWidth) + 'px';
      tooltip.style.top = ((-sp.y * 0.5 + 0.5) * innerHeight) + 'px';
      tooltip.classList.add('show');
    } else {
      hovered = null;
      canvas.style.cursor = dragging ? 'grabbing' : 'grab';
      tooltip.classList.remove('show');
    }
  }

  if (camTween) {
    const k = easeInOut(Math.min(1, (performance.now() - camTween.start) / camTween.dur));
    let dTheta = camTween.toTheta - camTween.fromTheta;
    if (dTheta > Math.PI) dTheta -= Math.PI * 2;
    if (dTheta < -Math.PI) dTheta += Math.PI * 2;
    orbit.theta = camTween.fromTheta + dTheta * k;
    orbit.phi = camTween.fromPhi + (camTween.toPhi - camTween.fromPhi) * k;
    orbit.radius = camTween.fromR + (camTween.toR - camTween.fromR) * k;
    orbit.target.lerpVectors(camTween.fromTarget, camTween.toTarget, k);
    if (k >= 1) { const cb = camTween.onDone; camTween = null; if (cb) cb(); }
  }
  applyOrbit();

  if (focused && holo.classList.contains('open') && innerWidth > 640) {
    focused.getWorldPosition(worldPos);
    worldPos.y += 1.7;
    const sp = worldPos.clone().project(camera);
    const x = (sp.x * 0.5 + 0.5) * innerWidth;
    const y = (-sp.y * 0.5 + 0.5) * innerHeight;
    holo.style.left = Math.round(Math.min(innerWidth - 320, Math.max(12, x + 20))) + 'px';
    holo.style.top = Math.round(Math.min(innerHeight - 340, Math.max(12, y - 40))) + 'px';
  }

  renderer.render(scene, camera);
}
animate();

addEventListener('resize', function () {
  camera.aspect = innerWidth / innerHeight;
  camera.fov = camera.aspect < 0.8 ? 64 : 50;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});
window.__yal = { anchorGroups: anchorGroups, camera: camera, orbit: orbit };
})();
</script>
