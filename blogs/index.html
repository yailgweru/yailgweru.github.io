<!DOCTYPE html>

<head>

<link rel="apple-touch-icon" href="../assets/favicon/apple-touch-icon.png" sizes="180x180">

<meta property="og:url" content="https://yailgweru.github.io/blogs/">
<meta property="og:title" content="Blog | Young AI Leaders Gweru Hub">
<meta property="og:description" content="Stories from Young AI Leaders Gweru Hub — ethical AI, social innovation and youth-led tech projects from the Midlands, Zimbabwe.">
<meta property="og:image" content="https://yailgweru.github.io/assets/logo.png">
<meta name="twitter:card" content="summary_large_image">
<meta name="theme-color" content="#0a0a0a">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { background: #0a0a0a; color: rgba(222,242,250,.92); font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; }
  .wrap { max-width: 900px; margin: 0 auto; padding: 24px 20px 64px; }
  .back { display: inline-block; font-size: 13px; letter-spacing: .5px; color: #6be8ff; text-decoration: none; margin-bottom: 22px; }
  .back:hover { text-decoration: underline; }
  h1 { font-size: clamp(26px, 5vw, 36px); color: #eaf9ff; margin-bottom: 8px; }
  .sub { font-size: 14px; color: rgba(191,243,255,.65); margin-bottom: 32px; }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 20px; }
  .card { background: rgba(107,232,255,.05); border: 1px solid rgba(107,232,255,.22); border-radius: 10px; overflow: hidden; text-decoration: none; color: inherit; display: flex; flex-direction: column; transition: border-color .2s, transform .2s; }
  .card:hover { border-color: rgba(107,232,255,.6); transform: translateY(-2px); }
  .card img { width: 100%; aspect-ratio: 16/9; object-fit: cover; display: block; background: #10131a; }
  .card-body { padding: 14px 16px 18px; }
  .card h2 { font-size: 16px; color: #d8f8ff; line-height: 1.4; margin-bottom: 6px; }
  .card p { font-size: 13px; color: rgba(222,242,250,.75); line-height: 1.55; margin-bottom: 10px; }
  .card .meta { font-size: 11px; color: rgba(191,243,255,.6); letter-spacing: .4px; }
  .empty { font-size: 14px; color: rgba(191,243,255,.6); }
  .controls { display: flex; flex-wrap: wrap; align-items: center; gap: 10px; margin-bottom: 24px; }
  .controls[hidden] { display: none; }
  .search { flex: 1 1 220px; max-width: 340px; background: rgba(107,232,255,.06); border: 1px solid rgba(107,232,255,.3); border-radius: 999px; padding: 8px 16px; font-size: 13px; color: #eaf9ff; font-family: inherit; outline: none; }
  .search::placeholder { color: rgba(191,243,255,.45); }
  .search:focus { border-color: rgba(107,232,255,.7); }
  .pill, .chip { background: rgba(107,232,255,.06); border: 1px solid rgba(107,232,255,.3); border-radius: 999px; padding: 7px 14px; font-size: 12px; letter-spacing: .4px; color: #bff3ff; cursor: pointer; font-family: inherit; transition: border-color .15s, background .15s; }
  .pill:hover, .chip:hover { border-color: rgba(107,232,255,.7); }
  .pill.active, .chip.active { background: rgba(107,232,255,.18); border-color: #6be8ff; color: #eaf9ff; }
  .chips { display: flex; flex-wrap: wrap; gap: 8px; flex-basis: 100%; }
  .chips-label { font-size: 11px; letter-spacing: 1.5px; text-transform: uppercase; color: rgba(191,243,255,.5); align-self: center; }
  @media (max-width: 640px) { .wrap { padding: 18px 16px 48px; } .search { max-width: none; } }
</style>
</head>
<body>
<div class="wrap">
  <a class="back" href="../index.html">&larr; Young AI Leaders Gweru Hub</a>
  <h1>Hub Blog</h1>
  <p class="sub">Stories from the Young AI Leaders Gweru Hub — projects, workshops and lessons from building AI in the Midlands.</p>
  <div class="controls" id="controls" hidden>
    <input class="search" id="search" type="search" placeholder="Search stories, tags, authors&hellip;" aria-label="Search blog posts">
    <button class="pill active" id="pill-latest" type="button">Latest stories</button>
    <button class="pill" id="pill-top" type="button">Top stories</button>
    <div class="chips" id="chips"></div>
  </div>
  <div class="grid" id="grid">
<!-- INLINE-BLOG-LIST:START — generated by scripts/prerender_seo.py. Rerun after editing data.json or publishing/removing a blog post. Do not hand-edit. -->
<a class="card" href="launching-the-gweru-hub.html" data-slug="launching-the-gweru-hub"><img src="../assets/blogs/launching-the-gweru-hub/launch-hero.jpg" alt="Launching the Gweru Hub" loading="lazy"><div class="card-body"><h2>Launching the Gweru Hub</h2><p>How the global AI movement found a home in the Midlands.</p><div class="meta">2026-03-01 &middot; by Hub Team &middot; #launch #gweru #ai-for-good</div></div></a>
<!-- INLINE-BLOG-LIST:END -->
  </div>
</div>
<script>
// The static cards above are prerendered by scripts/prerender_seo.py so
// crawlers see real links to each post page without running JS. The JS
// below re-renders the grid from manifest.json with search/filtering
// (same card markup — keep both renderers in sync); a card click is
// upgraded to the SPA reading panel at ../#blogs/<slug>.
var grid = document.getElementById('grid');
grid.addEventListener('click', function (e) {
  var card = e.target.closest ? e.target.closest('a.card[data-slug]') : null;
  if (!card) return;
  e.preventDefault();
  location.href = '../#blogs/' + card.getAttribute('data-slug');
});

function renderCard(p) {
  var tags = (p.tags || []).slice(0, 3).map(function (t) { return '#' + t; }).join(' ');
  var author = p.author ? ' &middot; by ' + p.author : '';
  return '<a class="card" href="' + p.slug + '.html" data-slug="' + p.slug + '">' +
    '<img src="../' + p.image + '" alt="' + p.title + '" loading="lazy">' +
    '<div class="card-body"><h2>' + p.title + '</h2><p>' + p.excerpt + '</p>' +
    '<div class="meta">' + p.date + author + (tags ? ' &middot; ' + tags : '') + '</div></div></a>';
}

fetch('manifest.json').then(function (r) { return r.json(); }).then(function (posts) {
  posts.sort(function (a, b) { return b.date.localeCompare(a.date); });
  if (!posts.length) {
    if (!grid.querySelector('a.card')) grid.innerHTML = '<p class="empty">No posts yet — check back soon.</p>';
    return;
  }

  var state = { query: '', mode: 'latest', author: null };
  var searchEl = document.getElementById('search');
  var pillLatest = document.getElementById('pill-latest');
  var pillTop = document.getElementById('pill-top');
  var chipsEl = document.getElementById('chips');

  function authorsOf(p) {
    return p.authors || (p.author ? p.author.split(' & ') : []);
  }

  function render() {
    var q = state.query.toLowerCase();
    var shown = posts.filter(function (p) {
      if (state.mode === 'top' && !p.featured) return false;
      if (state.author && authorsOf(p).indexOf(state.author) === -1) return false;
      if (!q) return true;
      var hay = [p.title, p.excerpt, p.author].concat(p.tags || [], p.topics || []).join(' ').toLowerCase();
      return hay.indexOf(q) !== -1;
    });
    grid.innerHTML = shown.length ? shown.map(renderCard).join('')
      : '<p class="empty">No stories match — try another search or filter.</p>';
  }

  // Author chips — every author gets a chip; clicking filters to their stories.
  var allAuthors = [];
  posts.forEach(function (p) {
    authorsOf(p).forEach(function (a) {
      if (allAuthors.indexOf(a) === -1) allAuthors.push(a);
    });
  });
  chipsEl.innerHTML = '<span class="chips-label">Authors</span>' + allAuthors.map(function (a) {
    return '<button class="chip" type="button" data-author="' + a.replace(/"/g, '&quot;') + '">' + a + '</button>';
  }).join('');
  chipsEl.addEventListener('click', function (e) {
    var chip = e.target.closest ? e.target.closest('button.chip') : null;
    if (!chip) return;
    var a = chip.getAttribute('data-author');
    state.author = state.author === a ? null : a;
    Array.prototype.forEach.call(chipsEl.querySelectorAll('.chip'), function (c) {
      c.classList.toggle('active', c.getAttribute('data-author') === state.author);
    });
    render();
  });

  function setMode(mode) {
    state.mode = mode;
    pillLatest.classList.toggle('active', mode === 'latest');
    pillTop.classList.toggle('active', mode === 'top');
    render();
  }
  pillLatest.addEventListener('click', function () { setMode('latest'); });
  pillTop.addEventListener('click', function () { setMode('top'); });
  searchEl.addEventListener('input', function () { state.query = searchEl.value.trim(); render(); });

  document.getElementById('controls').hidden = false;
  render();
}).catch(function (err) {
  console.error('Failed to load manifest.json', err);
  if (!grid.querySelector('a.card')) grid.innerHTML = '<p class="empty">Could not load posts.</p>';
});
</script>
</body>
</html>
