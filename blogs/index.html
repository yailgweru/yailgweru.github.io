<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { background: #0a0a0a; color: rgba(222,242,250,.92); font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; }
  .wrap { max-width: 900px; margin: 0 auto; padding: 24px 20px 64px; }
  .back { display: inline-block; font-size: 13px; letter-spacing: .5px; color: #6be8ff; text-decoration: none; margin-bottom: 22px; }
  .back:hover { text-decoration: underline; }
  h1 { font-size: clamp(26px, 5vw, 36px); color: #eaf9ff; margin-bottom: 8px; }
  .sub { font-size: 14px; color: rgba(191,243,255,.65); margin-bottom: 32px; }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 20px; }
  .card { background: rgba(107,232,255,.05); border: 1px solid rgba(107,232,255,.22); border-radius: 10px; overflow: hidden; text-decoration: none; color: inherit; display: flex; flex-direction: column; transition: border-color .2s, transform .2s; }
  .card:hover { border-color: rgba(107,232,255,.6); transform: translateY(-2px); }
  .card img { width: 100%; aspect-ratio: 16/9; object-fit: cover; display: block; background: #10131a; }
  .card-body { padding: 14px 16px 18px; }
  .card h2 { font-size: 16px; color: #d8f8ff; line-height: 1.4; margin-bottom: 6px; }
  .card p { font-size: 13px; color: rgba(222,242,250,.75); line-height: 1.55; margin-bottom: 10px; }
  .card .meta { font-size: 11px; color: rgba(191,243,255,.6); letter-spacing: .4px; }
  .empty { font-size: 14px; color: rgba(191,243,255,.6); }
  @media (max-width: 640px) { .wrap { padding: 18px 16px 48px; } }
</style>

<body>
<div class="wrap">
  <a class="back" href="../index.html">&larr; Young AI Leaders Gweru Hub</a>
  <h1>Hub Blog</h1>

  <div class="grid" id="grid">
<!-- INLINE-BLOG-LIST:START — generated by scripts/prerender_seo.py. Rerun after editing data.json or publishing/removing a blog post. Do not hand-edit. -->
<a class="card" href="launching-the-gweru-hub.html" data-slug="launching-the-gweru-hub"><img src="../assets/blogs/launching-the-gweru-hub/launch-hero.jpg" alt="Launching the Gweru Hub" loading="lazy"><div class="card-body"><h2>Launching the Gweru Hub</h2><p>How the global AI movement found a home in the Midlands.</p><div class="meta">2026-03-01 &middot; #launch #gweru #ai-for-good</div></div></a>
<!-- INLINE-BLOG-LIST:END -->
  </div>
</div>
<script>
// The static cards above are prerendered by scripts/prerender_seo.py so
// crawlers see real links to each post page without running JS. The fetch
// below only refreshes the grid (same markup — keep both renderers in
// sync); a click is upgraded to the SPA reading panel at ../#blogs/<slug>.
var grid = document.getElementById('grid');
grid.addEventListener('click', function (e) {
  var card = e.target.closest ? e.target.closest('a.card[data-slug]') : null;
  if (!card) return;
  e.preventDefault();
  location.href = '../#blogs/' + card.getAttribute('data-slug');
});
fetch('manifest.json').then(function (r) { return r.json(); }).then(function (posts) {
  posts.sort(function (a, b) { return b.date.localeCompare(a.date); });
  if (!posts.length) {
    if (!grid.querySelector('a.card')) grid.innerHTML = '<p class="empty">No posts yet — check back soon.</p>';
    return;
  }
  grid.innerHTML = posts.map(function (p) {
    var tags = (p.tags || []).slice(0, 3).map(function (t) { return '#' + t; }).join(' ');
    return '<a class="card" href="' + p.slug + '.html" data-slug="' + p.slug + '">' +
      '<img src="../' + p.image + '" alt="' + p.title + '" loading="lazy">' +
      '<div class="card-body"><h2>' + p.title + '</h2><p>' + p.excerpt + '</p>' +
      '<div class="meta">' + p.date + (tags ? ' &middot; ' + tags : '') + '</div></div></a>';
  }).join('');
}).catch(function (err) {
  console.error('Failed to load manifest.json', err);
  if (!grid.querySelector('a.card')) grid.innerHTML = '<p class="empty">Could not load posts.</p>';
});
</script>
</body>
