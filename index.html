function makeFacadeTexture(litChance) {
  const c = document.createElement('canvas'); c.width = 256; c.height = 512;
  const g = c.getContext('2d');
  g.fillStyle = '#10131a'; g.fillRect(0, 0, 256, 512);
  g.fillStyle = 'rgba(255,255,255,0.025)';
  for (let x = 0; x < 256; x += 32) g.fillRect(x, 0, 1, 512);
  const cols = 8, rows = 19, cw = 256 / cols, rh = (512 - 22) / rows;
  for (let r = 0; r < rows; r++) {
    for (let col = 0; col < cols; col++) {
      const y = 22 + r * rh;
      if (Math.random() < litChance) {
        const warm = Math.random() < 0.55;
        g.globalAlpha = 0.3 + Math.random() * 0.65;
        g.fillStyle = warm ? '#ffd68a' : '#a8ccff';
        g.fillRect(col * cw + 3, y + 3, cw - 6, rh - 8);
        g.globalAlpha = 1;
      } else {
        g.fillStyle = 'rgba(0,0,0,0.45)';
        g.fillRect(col * cw + 3, y + 3, cw - 6, rh - 8);
      }
    }
  }
  g.fillStyle = '#0b0d12';
  g.fillRect(0, 0, 16, 16);
  return new THREE.CanvasTexture(c);
}

function buildingBatch(count, litChance, rMin, rMax) {
  const tex = makeFacadeTexture(litChance);
  const mat = new THREE.MeshStandardMaterial({

    roughness: 1, metalness: 0, transparent: true, opacity: 0.4, side: THREE.DoubleSide
  });
  const mesh = new THREE.InstancedMesh(geo, mat, count);
  const refl = new THREE.InstancedMesh(geo, reflMat, count);
  refl.renderOrder = -2;
  const m = new THREE.Matrix4(), q = new THREE.Quaternion(), s = new THREE.Vector3(), pos = new THREE.Vector3();
  const eul = new THREE.Euler();
  const shade = new THREE.Color();
  for (let i = 0; i < count; i++) {
    const ang = Math.random() * Math.PI * 2;
    const rad = rMin + Math.random() * (rMax - rMin);
    const w = 1.4 + Math.random() * 2.4;
    const d = 1.4 + Math.random() * 2.4;
    const h = 2.5 + Math.pow(Math.random(), 1.7) * 12;
    pos.set(Math.sin(ang) * rad, -2.23 + h / 2, Math.cos(ang) * rad);
    q.setFromEuler(eul.set(0, (Math.random() - 0.5) * 0.3, 0));
    s.set(w, h, d);
    m.compose(pos, q, s);
    mesh.setMatrixAt(i, m);
    if (h > 11 && beaconSpots.length < 12) beaconSpots.push(new THREE.Vector3(pos.x, -2.23 + h + 0.35, pos.z));
    pos.y = -2.23 - h / 2 - 0.02;
    s.set(w, -h, d);

    refl.setMatrixAt(i, m);
    if (mesh.setColorAt) mesh.setColorAt(i, shade.setScalar(0.45 + Math.random() * 0.4));

  world.add(mesh);

}

function makePhoto(person) {
  if (person.image) {
    const img = document.createElement('img');
    img.src = person.image;
    img.alt = person.name || '';
    img.loading = 'lazy';
    return img;
  }
  const av = document.createElement('div');
  av.className = 'avatar';
  av.textContent = (person.name || '?').trim().split(/\s+/).map(function (w) { return w[0]; }).slice(0, 2).join('').toUpperCase();
  return av;
}

function makeSocialRow(person) {
  const links = [];
  if (person.linkedin) links.push({ href: person.linkedin, icon: 'assets/icons/linkedin.svg', label: 'LinkedIn' });
  if (person.site) links.push({ href: person.site, icon: 'assets/icons/website.svg', label: 'Website' });
  if (!links.length) return null;
  const row = document.createElement('div');
  row.className = 'social-row';
  links.forEach(function (l) {
    const a = document.createElement('a');
    a.href = l.href;
    a.target = '_blank';
    a.rel = 'noopener';
    a.setAttribute('aria-label', l.label + ' — ' + (person.name || ''));
    const img = document.createElement('img');
    img.src = l.icon;
    img.alt = '';
    a.appendChild(img);
    row.appendChild(a);
  });
  return row;
}

function addSideLabel(text) {
  const el = document.createElement('div');
  el.className = 'side-label';
  el.textContent = text;
  sideBody.appendChild(el);
}

const articleCache = {};
function fetchArticle(url) {
  if (!articleCache[url]) {
    articleCache[url] = fetch(url).then(function (r) {
      if (!r.ok) throw new Error('HTTP ' + r.status);
      return r.text();
    }).then(function (text) {
      const doc = new DOMParser().parseFromString(text, 'text/html');
      const content = doc.querySelector('.content');
      if (!content) throw new Error('No .content block in ' + url);
      const base = new URL(url, location.href);
      content.querySelectorAll('[src]').forEach(function (el) { el.setAttribute('src', new URL(el.getAttribute('src'), base).href); });
      content.querySelectorAll('a[href]').forEach(function (el) { el.setAttribute('href', new URL(el.getAttribute('href'), base).href); });
      const frag = document.createDocumentFragment();
      while (content.firstChild) frag.appendChild(content.firstChild);
      return frag;
    });
    articleCache[url].catch(function () { delete articleCache[url]; });
  }
  return articleCache[url];
}

function openSide(section, item) {
  const more = item.more;
  document.getElementById('side-kicker').textContent = more.kicker || section.title;
  document.getElementById('side-title').textContent = more.title || item.label;
  document.getElementById('side-meta').textContent = more.meta || '';
  sideBody.innerHTML = '';

  const people = section.people || {};
  const wantProfiles = more.people === 'leadership' || more.people === 'all';
  const wantMembers = more.people === 'members' || more.people === 'all';
  const profiles = more.profiles || (wantProfiles ? people.leadership : null) || [];
  const members = more.grid || (wantMembers ? people.members : null) || [];
  const showLabels = profiles.length && members.length;

  if (more.image) {
    const img = document.createElement('img');
    img.className = 'side-hero';
    img.src = more.image;
    img.alt = more.title || item.label;
    img.loading = 'lazy';
    sideBody.appendChild(img);
  }
  (more.body || []).forEach(function (t) {
    const el = document.createElement('p');
    el.textContent = t;
    sideBody.appendChild(el);
  });
  if (profiles.length) {
    if (showLabels) addSideLabel(more.profilesLabel || 'Leadership');
    profiles.forEach(function (p) {
      const card = document.createElement('div');
      card.className = 'profile';
      card.appendChild(makePhoto(p));
      const info = document.createElement('div');
      const name = document.createElement('div');
      name.className = 'p-name';
      name.textContent = p.name;
      info.appendChild(name);
      if (p.role) {
        const role = document.createElement('div');
        role.className = 'p-role';
        role.textContent = p.role;
        info.appendChild(role);
      }
      const bio = document.createElement('div');
      bio.className = 'p-bio';
      (Array.isArray(p.bio) ? p.bio : (p.bio ? [p.bio] : [])).forEach(function (t) {
        const para = document.createElement('p');
        para.textContent = t;
        bio.appendChild(para);
      });
      info.appendChild(bio);
      const social = makeSocialRow(p);
      if (social) info.appendChild(social);
      card.appendChild(info);
      sideBody.appendChild(card);
    });
  }
  if (members.length) {
    if (showLabels) addSideLabel(more.gridLabel || 'Official members');
    const grid = document.createElement('div');
    grid.className = 'member-grid';
    members.forEach(function (m) {
      const card = document.createElement('div');
      card.className = 'member';
      card.appendChild(makePhoto(m));
      const name = document.createElement('div');
      name.className = 'm-name';
      name.textContent = m.name;
      card.appendChild(name);
      if (m.role) {
        const role = document.createElement('div');
        role.className = 'm-role';
        role.textContent = m.role;
        card.appendChild(role);
      }
      if (m.brief) {
        const brief = document.createElement('div');
        brief.className = 'm-brief';
        brief.textContent = m.brief;
        card.appendChild(brief);
      }
      const social = makeSocialRow(m);
      if (social) card.appendChild(social);
      grid.appendChild(card);
    });
    sideBody.appendChild(grid);
  }
  if (more.fetch) {
    const holder = document.createElement('div');
    const loading = document.createElement('p');
    loading.textContent = 'Loading…';
    holder.appendChild(loading);
    sideBody.appendChild(holder);
    fetchArticle(more.fetch).then(function (frag) {
      holder.innerHTML = '';
      holder.appendChild(frag.cloneNode(true));
    }).catch(function () {
      holder.innerHTML = '';
      const p = document.createElement('p');
      p.textContent = more.fallback || 'Could not load this content.';
      holder.appendChild(p);
      const a = document.createElement('a');
      a.className = 'side-link';
      a.href = more.fetch;
      a.textContent = 'Open the post page →';
      holder.appendChild(a);
    });
  }
  if (more.link) {
    const a = document.createElement('a');
    a.className = 'side-link';
    a.href = more.link.href;
    a.textContent = more.link.label || 'Read more →';
    if (isExternal(more.link.href)) { a.target = '_blank'; a.rel = 'noopener'; }
    sideBody.appendChild(a);
  }

  sideBody.scrollTop = 0;
  side.classList.add('open');
  side.setAttribute('aria-hidden', 'false');
  history.replaceState(null, '', '#' + section.id + (item.slug ? '/' + item.slug : ''));
}
function closeSide() {
  if (!side.classList.contains('open')) return;
  side.classList.remove('open');
  side.setAttribute('aria-hidden', 'true');
  history.replaceState(null, '', focused ? '#' + focused.userData.section.id : location.pathname + location.search);
}
document.getElementById('side-close').addEventListener('click', closeSide);
addEventListener('keydown', function (e) { if (e.key === 'Escape') closeSide(); });

document.getElementById('holo-close').addEventListener('click', unfocus);
document.getElementById('holo-back').addEventListener('click', unfocus);

let dragging = false, moved = 0, lastX = 0, lastY = 0;
let pinchDist = 0;

canvas.addEventListener('pointerdown', function (e) {
  if (e.isPrimary === false) return;
  dragging = true; moved = 0; lastX = e.clientX; lastY = e.clientY;
  canvas.classList.add('dragging');
  canvas.setPointerCapture(e.pointerId);
});
canvas.addEventListener('pointermove', function (e) {
  pointer.x = (e.clientX / innerWidth) * 2 - 1;
  pointer.y = -(e.clientY / innerHeight) * 2 + 1;
  if (dragging) {
    const dx = e.clientX - lastX, dy = e.clientY - lastY;
    moved += Math.abs(dx) + Math.abs(dy);
    orbit.theta -= dx * 0.0055;
    orbit.phi = Math.max(orbit.minPhi, Math.min(orbit.maxPhi, orbit.phi - dy * 0.004));
    lastX = e.clientX; lastY = e.clientY;
    if (moved > 8) { camTween = null; }
  }
});
canvas.addEventListener('pointerup', function (e) {
  dragging = false;
  canvas.classList.remove('dragging');
  if (moved < 8) {
    pointer.x = (e.clientX / innerWidth) * 2 - 1;
    pointer.y = -(e.clientY / innerHeight) * 2 + 1;
    raycaster.setFromCamera(pointer, camera);
    const hits = raycaster.intersectObjects(anchorMeshes);
    if (hits.length) {
      const grp = hits[0].object.parent;
      if (focused === grp) { unfocus(); }
      else { closeHolo(); closeSide(); focusSection(grp); }
    } else if (focused) {
      unfocus();
    }
  }
});
canvas.addEventListener('wheel', function (e) {
  e.preventDefault();
  orbit.radius = Math.max(orbit.minR, Math.min(orbit.maxR, orbit.radius + e.deltaY * 0.012));
}, { passive: false });

canvas.addEventListener('touchstart', function (e) {
  if (e.touches.length === 2) {
    pinchDist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
  }
}, { passive: true });
canvas.addEventListener('touchmove', function (e) {
  if (e.touches.length === 2) {
    const d = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
    orbit.radius = Math.max(orbit.minR, Math.min(orbit.maxR, orbit.radius - (d - pinchDist) * 0.03));
    pinchDist = d;
  }
}, { passive: true });

const clock = new THREE.Clock();
const worldPos = new THREE.Vector3();

function animate() {
  requestAnimationFrame(animate);
  const t = clock.getElapsedTime();

  if (!reducedMotion) {
    pinGroup.rotation.y = t * 0.25;
    pinGroup.position.y = 2.6 + Math.sin(t * 0.9) * 0.14;
    haloRing.rotation.z = t * 0.4;
    pinRing.rotation.z = t * 0.6;
    world.rotation.y = t * 0.006;
    dust.rotation.y = -t * 0.012;
    pinGlow.material.opacity = 0.2 + Math.sin(t * 1.4) * 0.06;
    beacons.forEach(function (b, i) {
      b.material.opacity = 0.35 + Math.abs(Math.sin(t * 1.6 + i * 1.1)) * 0.55;
    });
    cars.forEach(function (c) {
      const a = c.a + t * c.speed;
      c.spr.position.set(Math.sin(a) * c.r, -2.1, Math.cos(a) * c.r);
    });
  }
  logoHolder.rotation.y = orbit.theta - pinGroup.rotation.y;

  if (!reducedMotion) {
    anchorGroups.forEach(function (g) {
      if (focused === g) {
        g.position.y += (g.userData.baseY - g.position.y) * 0.1;
      } else {
        g.position.y = g.userData.baseY + Math.sin(t * 1.1 + g.userData.phase) * 0.22;
      }
      g.userData.core.rotation.y = t * 0.7 + g.userData.phase;
      g.userData.ring.rotation.z = t * 0.9;
      const targetScale = (hovered === g.userData.core || focused === g) ? 1.35 : 1;
      g.userData.core.scale.lerp(new THREE.Vector3(targetScale, targetScale, targetScale), 0.12);
      const active = (hovered === g.userData.core || focused === g);
      g.userData.glow.material.opacity = (active ? 0.95 : 0.65) + Math.sin(t * 2 + g.userData.phase) * 0.15;
      const gs = (active ? 4.4 : 3.6) + Math.sin(t * 2 + g.userData.phase) * 0.25;
      g.userData.glow.scale.set(gs, gs, 1);
    });
  }

  if (!dragging && !isMobile) {
    raycaster.setFromCamera(pointer, camera);
    const hits = raycaster.intersectObjects(anchorMeshes);
    if (hits.length) {
      hovered = hits[0].object;
      canvas.style.cursor = 'pointer';
      hovered.parent.getWorldPosition(worldPos);
      const sp = worldPos.clone().project(camera);
      tooltip.style.left = ((sp.x * 0.5 + 0.5) * innerWidth) + 'px';
      tooltip.style.top = ((-sp.y * 0.5 + 0.5) * innerHeight) + 'px';
      tooltip.classList.add('show');
    } else {
      hovered = null;
      canvas.style.cursor = dragging ? 'grabbing' : 'grab';
      tooltip.classList.remove('show');
    }
  }

  if (camTween) {
    const k = easeInOut(Math.min(1, (performance.now() - camTween.start) / camTween.dur));
    let dTheta = camTween.toTheta - camTween.fromTheta;
    if (dTheta > Math.PI) dTheta -= Math.PI * 2;
    if (dTheta < -Math.PI) dTheta += Math.PI * 2;
    orbit.theta = camTween.fromTheta + dTheta * k;
    orbit.phi = camTween.fromPhi + (camTween.toPhi - camTween.fromPhi) * k;
    orbit.radius = camTween.fromR + (camTween.toR - camTween.fromR) * k;
    orbit.target.lerpVectors(camTween.fromTarget, camTween.toTarget, k);
    if (k >= 1) { const cb = camTween.onDone; camTween = null; if (cb) cb(); }
  }
  applyOrbit();

  if (focused && holo.classList.contains('open') && innerWidth > 640) {
    focused.getWorldPosition(worldPos);
    worldPos.y += 1.7;
    const sp = worldPos.clone().project(camera);
    const x = (sp.x * 0.5 + 0.5) * innerWidth;
    const y = (-sp.y * 0.5 + 0.5) * innerHeight;
    holo.style.left = Math.round(Math.min(innerWidth - 320, Math.max(12, x + 20))) + 'px';
    holo.style.top = Math.round(Math.min(innerHeight - 340, Math.max(12, y - 40))) + 'px';
  }

  renderer.render(scene, camera);
}
animate();

addEventListener('resize', function () {
  camera.aspect = innerWidth / innerHeight;
  camera.fov = camera.aspect < 0.8 ? 64 : 50;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});
function applyHash() {
  var h = decodeURIComponent(location.hash.replace(/^#/, ''));
  if (!h) return;
  var parts = h.split('/');
  var group = anchorGroups.find(function (g) { return g.userData.section.id === parts[0]; });
  if (!group) return;
  var section = group.userData.section;
  if (focused !== group) focusSection(group);
  if (parts[1]) {
    var item = (section.items || []).find(function (it) { return it.slug === parts[1]; });
    if (item && item.more) openSide(section, item);
  }
}
addEventListener('hashchange', applyHash);
applyHash();

window.__yal = { anchorGroups: anchorGroups, camera: camera, orbit: orbit };
})();
</script>
